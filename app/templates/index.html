<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touchgrass — Find Your City</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c4603a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='10' r='3'/><path d='M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #faf7f2;
      --terracotta: #c4603a;
      --forest:     #3a6b4a;
      --ink:        #1e1a16;
      --sand:       #e8d9c4;
      --sand-light: #f2ece2;
      --muted:      #8a7f74;
      --radius:     6px;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────── */

    .layout {
      display: grid;
      grid-template-columns: 1fr 520px;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      margin: 0 auto;
    }

    /* ── Header ──────────────────────────────── */

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 28px;
      border-bottom: 1px solid var(--sand);
      background: var(--cream);
    }

    .wordmark {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .header-tag {
      margin-left: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border: 1px solid var(--sand);
      border-radius: 20px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      padding: 4px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .history-btn:hover, .history-btn.active {
      border-color: var(--terracotta);
      color: var(--terracotta);
    }

    .user-badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .logout-btn {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .logout-btn:hover { color: var(--terracotta); }

    /* ── History panel ───────────────────────── */

    .history-panel {
      position: fixed;
      top: 56px;
      left: -340px;
      width: 320px;
      height: calc(100vh - 56px);
      background: var(--cream);
      border-right: 1px solid var(--sand);
      z-index: 50;
      transition: left 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(30,26,22,0.06);
    }

    .history-panel.open { left: 0; }

    .history-panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--sand);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .history-panel-header h3 {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 400;
    }

    .new-chat-btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .new-chat-btn:hover { background: #b0552f; }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

    .history-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--sand-light);
      cursor: pointer;
      transition: background 0.12s;
    }

    .history-item:hover { background: var(--sand-light); }
    .history-item.active { background: var(--sand-light); border-left: 2px solid var(--terracotta); }

    .history-item-date {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .history-item-cities {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.4;
    }

    .history-item-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .history-empty {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .history-loading {
      padding: 24px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Chat panel ──────────────────────────── */

    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--sand);
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

    /* ── Message bubbles ─────────────────────── */

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.assistant { align-self: flex-start; }
    .msg.user      { align-self: flex-end; }

    .msg-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .msg.user .msg-label { text-align: right; }

    .msg-bubble {
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .msg.assistant .msg-bubble {
      background: white;
      border: 1px solid var(--sand);
      color: var(--ink);
      border-bottom-left-radius: 2px;
    }

    .msg.user .msg-bubble {
      background: var(--ink);
      color: var(--cream);
      border-bottom-right-radius: 2px;
    }

    /* ── Typing indicator ────────────────────── */

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: white;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      border-bottom-left-radius: 2px;
      width: fit-content;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s ease infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.30s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ──────────────────────────── */

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--sand);
      background: var(--cream);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      background: white;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--terracotta); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      border: none;
      background: var(--terracotta);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled)  { background: #b0552f; }
    .send-btn:active:not(:disabled) { transform: scale(0.95); }
    .send-btn:disabled              { background: var(--sand); cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; }

    /* ── Results panel ───────────────────────── */

    .results-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--sand-light);
    }

    .results-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--sand);
    }

    .results-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
    }

    .results-header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px;
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

    /* ── City card ───────────────────────────── */

    .city-card {
      background: white;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      padding: 14px 16px;
      animation: fadeUp 0.3s ease both;
      cursor: default;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .city-card:hover {
      border-color: var(--terracotta);
      box-shadow: 0 2px 12px rgba(196, 96, 58, 0.08);
    }

    .city-card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .city-rank {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--terracotta);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .city-name {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      flex: 1;
    }

    .city-score {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    .score-bar-track {
      height: 4px;
      background: var(--sand);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .score-bar-fill {
      height: 100%;
      background: var(--terracotta);
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sub-scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }

    .sub-score-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
    }

    .sub-score-label { color: var(--muted); }

    .sub-score-val {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--ink);
    }

    /* ── Stats toggle button ─────────────────── */

    .stats-toggle {
      width: 100%;
      margin-top: 10px;
      padding: 6px 0;
      background: none;
      border: none;
      border-top: 1px solid var(--sand);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .stats-toggle:hover { color: var(--terracotta); }

    .stats-toggle .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      font-style: normal;
    }

    .city-card.expanded .stats-toggle .chevron {
      transform: rotate(180deg);
    }

    /* ── Stats drawer ────────────────────────── */

    .stats-drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .city-card.expanded .stats-drawer {
      max-height: 9999px;
    }

    .stats-drawer-inner {
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .stats-category-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--sand);
    }

    .stat-row:last-child { border-bottom: none; padding-bottom: 0; }

    .stat-row-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--ink);
      font-weight: 500;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--ink);
      white-space: nowrap;
    }

    .stat-descriptor {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .stats-loading {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 12px 0;
    }

    /* ── Empty state ─────────────────────────── */

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.6;
      max-width: 200px;
    }

    /* ── Error toast ─────────────────────────── */

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--cream);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="layout">

  <header>
    <a class="wordmark" href="/">Touchgrass</a>
    <span class="header-tag">City Match</span>
    <div class="header-right">
      <button class="history-btn" id="history-btn" onclick="toggleHistory()">&#9776; History</button>
      <span class="user-badge" id="user-badge"></span>
      <form method="POST" action="/auth/logout" style="display:inline">
        <button class="logout-btn" type="submit">Sign out</button>
      </form>
    </div>
  </header>

  <!-- History panel -->
  <div class="history-panel" id="history-panel">
    <div class="history-panel-header">
      <h3>Past Chats</h3>
      <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-loading">Loading…</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="input"
          placeholder="Tell me what's going on..."
          rows="1"
          disabled
        ></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <div class="results-header">
      <h2>Your Cities</h2>
      <p>Results will appear as we talk</p>
    </div>
    <div id="results-list" class="results-list">
      <div class="empty-state">
        <div class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted); opacity: 0.5;">
            <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/>
          </svg>
        </div>
        <p>Answer a few questions and we'll find your best matches</p>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const resultsEl   = document.getElementById('results-list');
  const toastEl     = document.getElementById('toast');

  let conversationId  = null;
  let isWaiting       = false;
  let historyOpen     = false;
  let currentUsername = '';

  // ── Toast ───────────────────────────────────
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3000);
  }

  // ── Scroll to bottom ────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Add message to chat ─────────────────────
  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'assistant' ? 'Touchgrass' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text.replace(/\*\*(.+?)\*\*/g, '$1');

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  // ── Typing indicator ────────────────────────
  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';
    wrapper.id = 'typing-indicator';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Touchgrass';

    const indicator = document.createElement('div');
    indicator.className = 'typing';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(label);
    wrapper.appendChild(indicator);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Render results panel ────────────────────
  function renderCities(cities) {
    if (!cities || cities.length === 0) return;

    resultsEl.innerHTML = '';

    cities.forEach(city => {
      const card = document.createElement('div');
      card.className = 'city-card';
      card.dataset.geoId = city.geo_id;

      const score = city.personalized_score ?? 0;

      card.innerHTML = `
        <div class="city-card-top">
          <span class="city-rank">#${city.rank}</span>
          <span class="city-name">${city.name}</span>
          <span class="city-score">${score.toFixed(1)}</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width: ${score}%"></div>
        </div>
        <button class="stats-toggle" onclick="toggleStats(this)">
          View Stats <span class="chevron">&#9660;</span>
        </button>
        <div class="stats-drawer">
          <div class="stats-drawer-inner"></div>
        </div>
      `;

      resultsEl.appendChild(card);
    });
  }

  // ── Toggle stats drawer ─────────────────────
  async function toggleStats(btn) {
    const card   = btn.closest('.city-card');
    const drawer = card.querySelector('.stats-drawer');
    const inner  = card.querySelector('.stats-drawer-inner');
    const geoId  = card.dataset.geoId;

    // Toggle collapsed state
    const isOpen = card.classList.toggle('expanded');

    if (!isOpen) return; // collapsing — nothing to fetch

    // Already loaded — just re-open
    if (card.dataset.statsLoaded) return;

    // First open — fetch and render
    inner.innerHTML = '<div class="stats-loading">Loading...</div>';

    try {
      const res = await fetch(`/api/city/${geoId}`);
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();

      // Group stats by category
      const grouped = {};
      data.stats.forEach(stat => {
        if (!grouped[stat.category]) grouped[stat.category] = [];
        grouped[stat.category].push(stat);
      });

      inner.innerHTML = Object.entries(grouped).map(([category, stats]) => `
        <div>
          <div class="stats-category-label">${category}</div>
          ${stats.map(s => `
            <div class="stat-row">
              <div class="stat-row-top">
                <span class="stat-label">${s.label}</span>
                <span class="stat-value">${s.value}</span>
              </div>
              <div class="stat-descriptor">${s.descriptor}</div>
            </div>
          `).join('')}
        </div>
      `).join('');

      card.dataset.statsLoaded = 'true';

    } catch (err) {
      inner.innerHTML = '<div class="stats-loading">Could not load stats.</div>';
      console.error('Stats fetch failed:', err);
    }
  }

  // ── Set UI state ────────────────────────────
  function setWaiting(waiting) {
    isWaiting = waiting;
    inputEl.disabled = waiting;
    sendBtn.disabled = waiting;
    if (!waiting) inputEl.focus();
  }

  // ── Send message ────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting || !conversationId) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage('user', text);
    setWaiting(true);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversationId, message: text }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      hideTyping();
      addMessage('assistant', data.message);

      if (data.cities) {
        renderCities(data.cities);
      }

      if (data.at_limit) {
        inputEl.disabled = true;
        sendBtn.disabled = true;
        inputEl.placeholder = 'Conversation complete';
      }

    } catch (err) {
      hideTyping();
      showToast('Something went wrong — please try again');
      console.error(err);
    } finally {
      setWaiting(false);
    }
  }

  // ── Textarea auto-resize ────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // ── Send on Enter (Shift+Enter = newline) ───
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Start conversation on load ──────────────
  async function init() {
    showTyping();
    try {
      const res = await fetch('/api/start', { method: 'POST' });
      if (!res.ok) throw new Error(`Start failed: ${res.status}`);
      const data = await res.json();

      conversationId = data.conversation_id;
      hideTyping();
      addMessage('assistant', data.message);
      setWaiting(false);

    } catch (err) {
      hideTyping();
      addMessage('assistant', 'Something went wrong starting the conversation. Please refresh.');
      console.error(err);
    }
  }

  // ── Fetch current user ──────────────────────
  async function fetchMe() {
    try {
      const res = await fetch('/api/me');
      if (!res.ok) return;
      const data = await res.json();
      currentUsername = data.username;
      document.getElementById('user-badge').textContent = data.username;
    } catch (e) { /* silently ignore */ }
  }

  // ── History panel toggle ─────────────────────
  function toggleHistory() {
    const panel = document.getElementById('history-panel');
    const btn   = document.getElementById('history-btn');
    historyOpen = !historyOpen;
    panel.classList.toggle('open', historyOpen);
    btn.classList.toggle('active', historyOpen);
    if (historyOpen) fetchHistory();
  }

  // ── Fetch and render history ─────────────────
  async function fetchHistory() {
    const listEl = document.getElementById('history-list');
    listEl.innerHTML = '<div class="history-loading">Loading…</div>';
    try {
      const res = await fetch('/api/history');
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderHistory(data.conversations);
    } catch (e) {
      listEl.innerHTML = '<div class="history-empty">Could not load history.</div>';
    }
  }

  function renderHistory(conversations) {
    const listEl = document.getElementById('history-list');
    if (!conversations || conversations.length === 0) {
      listEl.innerHTML = '<div class="history-empty">No previous chats yet.<br>Start a new conversation to see your history here.</div>';
      return;
    }

    listEl.innerHTML = conversations.map(c => {
      const date = c.created_at
        ? new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '—';
      const cityNames = c.top_cities.length
        ? c.top_cities.map(ct => ct.name.split(',')[0]).join(', ')
        : 'No results yet';
      const isActive = c.id === conversationId;
      const meta = `${c.turn_count} turns · ${c.query_count} quer${c.query_count === 1 ? 'y' : 'ies'}`;

      return `
        <div class="history-item${isActive ? ' active' : ''}" onclick="loadPastConversation('${c.id}')">
          <div class="history-item-date">${date}</div>
          <div class="history-item-cities">${cityNames}</div>
          <div class="history-item-meta">${meta}${c.completed ? ' · completed' : ''}</div>
        </div>`;
    }).join('');
  }

  // ── Load a past conversation's results ───────
  async function loadPastConversation(id) {
    try {
      const res = await fetch(`/api/results/${id}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      if (data.cities) renderCities(data.cities);
      // Update active state
      document.querySelectorAll('.history-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('onclick').includes(id));
      });
    } catch (e) {
      showToast('Could not load past results.');
    }
  }

  // ── Start a brand-new chat ───────────────────
  async function startNewChat() {
    // Close history panel
    historyOpen = false;
    document.getElementById('history-panel').classList.remove('open');
    document.getElementById('history-btn').classList.remove('active');

    // Reset UI
    document.getElementById('messages').innerHTML = '';
    document.getElementById('results-list').innerHTML = `
      <div class="empty-state">
        <div class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted); opacity: 0.5;">
            <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/>
          </svg>
        </div>
        <p>Answer a few questions and we'll find your best matches</p>
      </div>`;
    conversationId = null;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    inputEl.placeholder = 'Tell me what\'s going on...';
    await init();
  }

  fetchMe();
  init();
</script>
</body>
</html>
