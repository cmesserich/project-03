<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touchgrass — Find Your City</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c4603a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='10' r='3'/><path d='M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #faf7f2;
      --terracotta: #c4603a;
      --forest:     #3a6b4a;
      --ink:        #1e1a16;
      --sand:       #e8d9c4;
      --sand-light: #f2ece2;
      --muted:      #8a7f74;
      --radius:     6px;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────── */

    .layout {
      display: grid;
      grid-template-columns: 1fr 520px;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      margin: 0 auto;
    }

    /* ── Header ──────────────────────────────── */

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 28px;
      border-bottom: 1px solid var(--sand);
      background: var(--cream);
    }

    .wordmark {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .header-tag {
      margin-left: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border: 1px solid var(--sand);
      border-radius: 20px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      padding: 4px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .history-btn:hover, .history-btn.active {
      border-color: var(--terracotta);
      color: var(--terracotta);
    }

    .user-badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .logout-btn {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .logout-btn:hover { color: var(--terracotta); }

    /* ── History panel ───────────────────────── */

    .history-panel {
      position: fixed;
      top: 56px;
      left: -340px;
      width: 320px;
      height: calc(100vh - 56px);
      background: var(--cream);
      border-right: 1px solid var(--sand);
      z-index: 50;
      transition: left 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(30,26,22,0.06);
    }

    .history-panel.open { left: 0; }

    .history-panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--sand);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .history-panel-header h3 {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-weight: 400;
    }

    .new-chat-btn {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .new-chat-btn:hover { background: #b0552f; }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

    .history-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--sand-light);
      cursor: pointer;
      transition: background 0.12s;
    }

    .history-item:hover { background: var(--sand-light); }
    .history-item.active { background: var(--sand-light); border-left: 2px solid var(--terracotta); }

    .history-item-date {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .history-item-cities {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.4;
    }

    .history-item-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .history-empty {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .history-loading {
      padding: 24px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Chat panel ──────────────────────────── */

    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--sand);
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

    /* ── Message bubbles ─────────────────────── */

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.assistant { align-self: flex-start; }
    .msg.user      { align-self: flex-end; }

    .msg-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .msg.user .msg-label { text-align: right; }

    .msg-bubble {
      padding: 13px 17px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .msg.assistant .msg-bubble {
      background: white;
      border: 1px solid var(--sand);
      color: var(--ink);
      border-bottom-left-radius: 2px;
    }

    .msg.user .msg-bubble {
      background: var(--ink);
      color: var(--cream);
      border-bottom-right-radius: 2px;
    }

    /* Markdown rendering inside assistant bubbles */
    .msg-bubble p { margin: 0 0 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble .msg-spacer { height: 4px; }
    .msg-bubble .msg-category {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--terracotta);
      margin: 10px 0 4px;
    }
    .msg-bubble .msg-list {
      margin: 4px 0 8px 16px;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg-bubble .msg-list li { line-height: 1.5; }

    /* ── Typing indicator ────────────────────── */

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: white;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      border-bottom-left-radius: 2px;
      width: fit-content;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s ease infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.30s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ──────────────────────────── */

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--sand);
      background: var(--cream);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      background: white;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--terracotta); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      border: none;
      background: var(--terracotta);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled)  { background: #b0552f; }
    .send-btn:active:not(:disabled) { transform: scale(0.95); }
    .send-btn:disabled              { background: var(--sand); cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; }

    /* ── Results panel ───────────────────────── */

    .results-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--sand-light);
    }

    .results-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--sand);
    }

    .results-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
    }

    .results-header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px;
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

    /* ── City card ───────────────────────────── */

    .city-card {
      background: white;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      padding: 14px 16px;
      animation: fadeUp 0.3s ease both;
      cursor: default;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .city-card:hover {
      border-color: var(--terracotta);
      box-shadow: 0 2px 12px rgba(196, 96, 58, 0.08);
    }

    .city-card-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .city-rank {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--terracotta);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .city-name {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--ink);
      flex: 1;
    }

    .city-score {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    .score-bar-track {
      height: 4px;
      background: var(--sand);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .score-bar-fill {
      height: 100%;
      background: var(--terracotta);
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sub-scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }

    .sub-score-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
    }

    .sub-score-label { color: var(--muted); }

    .sub-score-val {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--ink);
    }

    /* ── Stats toggle button ─────────────────── */

    .stats-toggle {
      width: 100%;
      margin-top: 10px;
      padding: 6px 0;
      background: none;
      border: none;
      border-top: 1px solid var(--sand);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: color 0.15s;
    }

    .stats-toggle:hover { color: var(--terracotta); }

    .stats-toggle .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      font-style: normal;
    }

    .city-card.expanded .stats-toggle .chevron {
      transform: rotate(180deg);
    }

    /* ── Stats drawer ────────────────────────── */

    .stats-drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .city-card.expanded .stats-drawer {
      max-height: 9999px;
    }

    .stats-drawer-inner {
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .stats-category-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 6px;
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--sand);
    }

    .stat-row:last-child { border-bottom: none; padding-bottom: 0; }

    .stat-row-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--ink);
      font-weight: 500;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--ink);
      white-space: nowrap;
    }

    .stat-descriptor {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .stats-loading {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 12px 0;
    }

    /* ── City preview button (in chat thread) ─── */

    .city-preview-btn {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      padding: 10px 16px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--ink);
      transition: border-color 0.15s, background 0.15s;
      animation: fadeUp 0.2s ease both;
      margin-top: 2px;
    }
    .city-preview-btn:hover {
      border-color: var(--terracotta);
      background: #fdf8f5;
    }
    .city-preview-btn svg { color: var(--terracotta); flex-shrink: 0; }
    .city-preview-btn-name { font-weight: 500; }
    .city-preview-btn-hint { color: var(--muted); }

    /* ── City modal ──────────────────────────── */

    .city-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 26, 22, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      animation: fadeIn 0.15s ease;
    }
    .city-modal {
      position: relative;
      width: 400px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 64px);
      overflow-y: auto;
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      animation: slideUp 0.2s ease;
    }
    .city-modal-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 3px;
    }
    .city-modal-close:hover { color: var(--ink); background: var(--sand-light); }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(14px) } to { opacity: 1; transform: translateY(0) } }

    .ccc-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--sand-light);
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .ccc-city-name {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
    }

    .ccc-city-state {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ccc-map {
      width: 100%;
      aspect-ratio: 5 / 3.5;
      background: #f9f7f4;
      line-height: 0;
      overflow: hidden;
    }

    .ccc-map img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .ccc-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--sand-light);
    }

    .ccc-stat {
      padding: 10px 14px;
      border-bottom: 1px solid var(--sand-light);
      border-right: 1px solid var(--sand-light);
    }

    .ccc-stat:nth-child(even) { border-right: none; }
    .ccc-stat:nth-last-child(-n+2) { border-bottom: none; }

    .ccc-stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-bottom: 2px;
    }

    .ccc-stat-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
    }

    .ccc-scores {
      padding: 11px 14px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      border-bottom: 1px solid var(--sand-light);
    }

    .ccc-score-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ccc-score-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      width: 66px;
      flex-shrink: 0;
    }

    .ccc-score-track {
      flex: 1;
      height: 3px;
      background: var(--sand-light);
      border-radius: 2px;
      overflow: hidden;
    }

    .ccc-score-fill {
      height: 100%;
      background: var(--terracotta);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .ccc-score-val {
      font-size: 10px;
      color: var(--ink);
      font-family: 'Space Mono', monospace;
      width: 20px;
      text-align: right;
    }

    .ccc-report-upsell {
      padding: 16px 16px 18px;
      background: var(--cream);
    }
    .ccc-report-title {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .ccc-report-items {
      list-style: none;
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .ccc-report-items li {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 7px;
      line-height: 1.4;
    }
    .ccc-report-items li::before {
      content: '✓';
      color: var(--forest);
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .ccc-report-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: var(--forest);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .ccc-report-btn:hover { opacity: 0.88; }

    /* ── Empty state ─────────────────────────── */

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.6;
      max-width: 200px;
    }

    /* ── Report CTA ──────────────────────────── */

    .report-cta-wrap {
      padding: 12px 16px;
      border-top: 1px solid var(--sand);
      background: var(--cream);
      flex-shrink: 0;
    }

    .report-cta-card {
      background: white;
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      padding: 14px 15px;
    }

    .report-cta-title {
      font-family: 'Fraunces', serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .report-cta-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 11px;
      line-height: 1.5;
    }

    .report-buy-btn {
      width: 100%;
      background: var(--forest);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 9px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    .report-buy-btn:hover:not(:disabled) { background: #2d5438; }
    .report-buy-btn:disabled { background: var(--sand); color: var(--muted); cursor: default; }

    .report-download-btn {
      width: 100%;
      background: none;
      border: 1px solid var(--forest);
      color: var(--forest);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .report-download-btn:hover { background: var(--forest); color: white; }

    .report-status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--terracotta);
      animation: pulse 1.4s ease-in-out infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    /* ── Error toast ─────────────────────────── */

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--cream);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="layout">

  <header>
    <a class="wordmark" href="/">Touchgrass</a>
    <span class="header-tag">City Match</span>
    <div class="header-right">
      <button class="history-btn" id="history-btn" onclick="toggleHistory()">&#9776; History</button>
      <span class="user-badge" id="user-badge"></span>
      <form method="POST" action="/auth/logout" style="display:inline">
        <button class="logout-btn" type="submit">Sign out</button>
      </form>
    </div>
  </header>

  <!-- History panel -->
  <div class="history-panel" id="history-panel">
    <div class="history-panel-header">
      <h3>Past Chats</h3>
      <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-loading">Loading…</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="input"
          placeholder="Tell me what's going on..."
          rows="1"
          disabled
        ></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <div class="results-header">
      <h2>Your Cities</h2>
      <p>Results will appear as we talk</p>
    </div>
    <div id="results-list" class="results-list">
      <div class="empty-state" id="results-empty-state">
        <div class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted); opacity: 0.5;">
            <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/>
          </svg>
        </div>
        <p>Answer a few questions and we'll find your best matches</p>
      </div>
    </div>
    <!-- Report CTA — shown after results appear -->
    <div id="report-cta-container" style="display:none"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send-btn');
  const resultsEl   = document.getElementById('results-list');
  const toastEl     = document.getElementById('toast');

  let conversationId  = null;
  let isWaiting       = false;
  let historyOpen     = false;
  let currentUsername = '';
  let reportPollTimer = null;

  // ── URL params (Stripe return) ───────────────
  const _urlParams      = new URLSearchParams(window.location.search);
  const _reportSuccess  = _urlParams.get('report_success') === '1';
  const _urlConvId      = _urlParams.get('conversation_id');
  if (_reportSuccess || _urlConvId) {
    window.history.replaceState({}, '', '/');
  }

  // ── Toast ───────────────────────────────────
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3000);
  }

  // ── Scroll to bottom ────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Markdown → safe HTML (for assistant messages) ───────────
  function formatMessageHtml(raw) {
    // Escape HTML to prevent XSS
    const esc = raw
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    const lines = esc.split('\n');
    let html = '';
    let inList = false;

    for (const line of lines) {
      const t = line.trim();
      const inlineFmt = s => s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      if (t.startsWith('- ')) {
        if (!inList) { html += '<ul class="msg-list">'; inList = true; }
        html += `<li>${inlineFmt(t.slice(2))}</li>`;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        if (t === '') {
          html += '<div class="msg-spacer"></div>';
        } else if (/^[A-Z][^:]{2,30}:\s*$/.test(t)) {
          // Category headers like "Economic & Housing:" or "Lifestyle:"
          html += `<div class="msg-category">${inlineFmt(t)}</div>`;
        } else {
          html += `<p>${inlineFmt(t)}</p>`;
        }
      }
    }
    if (inList) html += '</ul>';
    return html;
  }

  // ── Add message to chat ─────────────────────
  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'assistant' ? 'Touchgrass' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (role === 'assistant') {
      bubble.innerHTML = formatMessageHtml(text);
    } else {
      bubble.textContent = text;
    }

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  // ── City card helpers ────────────────────────
  function _fmtPop(v) {
    if (!v) return 'N/A';
    if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
    return String(v);
  }
  function _fmtMoney(v) { return v ? '$' + Math.round(v).toLocaleString() : 'N/A'; }
  function _fmtRent(v)  { return v ? '$' + Math.round(v).toLocaleString() + '/mo' : 'N/A'; }
  function _fmtScore(v) { return v != null ? Math.round(v) : 0; }
  function _scoreBars(card) {
    return [
      { label: 'Economic',  val: _fmtScore(card.econ_score) },
      { label: 'Lifestyle', val: _fmtScore(card.lifestyle_score) },
      { label: 'Community', val: _fmtScore(card.community_score) },
      { label: 'Mobility',  val: _fmtScore(card.mobility_score) },
      { label: 'Health',    val: _fmtScore(card.health_score) },
    ].map(s => `
      <div class="ccc-score-row">
        <span class="ccc-score-label">${s.label}</span>
        <div class="ccc-score-track"><div class="ccc-score-fill" style="width:${s.val}%"></div></div>
        <span class="ccc-score-val">${s.val}</span>
      </div>`).join('');
  }
  function _stateLabel(card) {
    return (card.state && card.name && card.name.includes(card.state)) ? '' : (card.state || '');
  }

  // ── City preview button (in chat) ────────────
  function renderCityCard(card) {
    if (!card || !card.geo_id) return;

    const btn = document.createElement('button');
    btn.className = 'city-preview-btn';
    btn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/>
      </svg>
      <span class="city-preview-btn-name">${card.name}</span>
      <span class="city-preview-btn-hint">— view city snapshot</span>`;
    btn.onclick = () => openCityModal(card);

    messagesEl.appendChild(btn);
    requestAnimationFrame(() => btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
  }

  // ── City modal ───────────────────────────────
  function openCityModal(card) {
    closeCityModal(); // remove any existing
    const sl = _stateLabel(card);
    const overlay = document.createElement('div');
    overlay.id = 'city-modal-overlay';
    overlay.className = 'city-modal-overlay';
    overlay.innerHTML = `
      <div class="city-modal">
        <button class="city-modal-close" onclick="closeCityModal()">&#10005;</button>
        <div class="ccc-header">
          <span class="ccc-city-name">${card.name}</span>
          ${sl ? `<span class="ccc-city-state">${sl}</span>` : ''}
        </div>
        <div class="ccc-map">
          <img src="/api/city/${card.geo_id}/map" alt="Metro map"
               onerror="this.style.display='none';this.parentElement.style.background='var(--sand-light)'" />
        </div>
        <div class="ccc-stats-grid">
          <div class="ccc-stat"><div class="ccc-stat-label">Population</div><div class="ccc-stat-value">${_fmtPop(card.population)}</div></div>
          <div class="ccc-stat"><div class="ccc-stat-label">Median Income</div><div class="ccc-stat-value">${_fmtMoney(card.median_household_income)}</div></div>
          <div class="ccc-stat"><div class="ccc-stat-label">Median Rent</div><div class="ccc-stat-value">${_fmtRent(card.median_gross_rent)}</div></div>
          <div class="ccc-stat"><div class="ccc-stat-label">Home Value</div><div class="ccc-stat-value">${_fmtMoney(card.median_home_value)}</div></div>
        </div>
        <div class="ccc-scores">${_scoreBars(card)}</div>
        <div class="ccc-report-upsell">
          <div class="ccc-report-title">Get the full picture — $9</div>
          <ul class="ccc-report-items">
            <li>Full metro boundary map in print-ready PDF</li>
            <li>Complete breakdown of all 16 scoring factors with context</li>
            <li>Side-by-side comparison of your top cities</li>
            <li>Cost of living snapshot: rent, home values, income ratios</li>
            <li>Neighborhood quality, commute, transit &amp; outdoor access</li>
          </ul>
          <button class="ccc-report-btn" onclick="closeCityModal();triggerReportPurchase()">
            Download Full Report &mdash; $9
          </button>
        </div>
      </div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) closeCityModal(); });
    document.body.appendChild(overlay);
  }

  function closeCityModal() {
    const el = document.getElementById('city-modal-overlay');
    if (el) el.remove();
  }

  async function triggerReportPurchase() {
    if (!conversationId) return;
    try {
      const res = await fetch(`/api/report/checkout/${conversationId}`, { method: 'POST' });
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();
      if (data.already_paid) {
        showReportCta(data.status, data.report_id);
        if (data.status === 'generating') startReportPolling(conversationId);
        return;
      }
      if (data.checkout_url) window.location.href = data.checkout_url;
    } catch (e) {
      showToast('Something went wrong — please try again.');
    }
  }

  // ── Typing indicator ────────────────────────
  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';
    wrapper.id = 'typing-indicator';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Touchgrass';

    const indicator = document.createElement('div');
    indicator.className = 'typing';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(label);
    wrapper.appendChild(indicator);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Report CTA ───────────────────────────────
  const reportCta = document.getElementById('report-cta-container');

  function showReportCta(state, reportId) {
    // state: 'unpaid' | 'pending' | 'generating' | 'ready' | 'failed'
    reportCta.style.display = 'block';
    let html = '';
    if (state === 'unpaid' || state === 'pending') {
      html = `
        <div class="report-cta-wrap">
          <div class="report-cta-card">
            <div class="report-cta-title">Take your results with you</div>
            <div class="report-cta-desc">Get a polished PDF with metro maps, full stats breakdown, and a city comparison matrix — $9.</div>
            <button class="report-buy-btn" id="report-buy-btn" onclick="purchaseReport()">
              Download Report &mdash; $9
            </button>
          </div>
        </div>`;
    } else if (state === 'generating') {
      html = `
        <div class="report-cta-wrap">
          <div class="report-cta-card">
            <div class="report-cta-title"><span class="report-status-dot"></span>Generating your report…</div>
            <div class="report-cta-desc">This takes about 15–30 seconds. We'll update this automatically.</div>
            <button class="report-buy-btn" disabled>Building PDF…</button>
          </div>
        </div>`;
    } else if (state === 'ready' && reportId) {
      html = `
        <div class="report-cta-wrap">
          <div class="report-cta-card">
            <div class="report-cta-title">Your report is ready</div>
            <div class="report-cta-desc">Download your personalized relocation report below.</div>
            <a class="report-download-btn" href="/api/report/download/${reportId}" download>
              &#8595; Download PDF
            </a>
          </div>
        </div>`;
    } else if (state === 'failed') {
      html = `
        <div class="report-cta-wrap">
          <div class="report-cta-card">
            <div class="report-cta-title">Report generation failed</div>
            <div class="report-cta-desc">Something went wrong. Please contact support with your conversation ID.</div>
          </div>
        </div>`;
    }
    reportCta.innerHTML = html;
  }

  async function checkReportStatus(convId) {
    try {
      const res = await fetch(`/api/report/status/${convId}`);
      if (!res.ok) return;
      const data = await res.json();
      showReportCta(data.status, data.report_id);
      if (data.status === 'generating') {
        startReportPolling(convId);
      }
    } catch (e) {
      showReportCta('unpaid', null);
    }
  }

  function startReportPolling(convId) {
    if (reportPollTimer) return; // already polling
    reportPollTimer = setInterval(async () => {
      try {
        const res = await fetch(`/api/report/status/${convId}`);
        if (!res.ok) return;
        const data = await res.json();
        showReportCta(data.status, data.report_id);
        if (data.status === 'ready' || data.status === 'failed') {
          clearInterval(reportPollTimer);
          reportPollTimer = null;
          if (data.status === 'ready') showToast('Your report is ready to download!');
        }
      } catch (e) { /* ignore */ }
    }, 4000);
  }

  async function purchaseReport() {
    const btn = document.getElementById('report-buy-btn');
    if (!btn || !conversationId) return;
    btn.disabled = true;
    btn.textContent = 'Redirecting to checkout…';
    try {
      const res = await fetch(`/api/report/checkout/${conversationId}`, { method: 'POST' });
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();
      if (data.already_paid) {
        showReportCta(data.status, data.report_id);
        if (data.status === 'generating') startReportPolling(conversationId);
        return;
      }
      if (data.checkout_url) {
        window.location.href = data.checkout_url;
      }
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Download Report — $9';
      showToast('Could not start checkout — please try again.');
    }
  }

  // ── Render results panel ────────────────────
  function renderCities(cities) {
    if (!cities || cities.length === 0) return;

    resultsEl.innerHTML = '';

    cities.forEach(city => {
      const card = document.createElement('div');
      card.className = 'city-card';
      card.dataset.geoId = city.geo_id;

      const score = city.personalized_score ?? 0;

      card.innerHTML = `
        <div class="city-card-top">
          <span class="city-rank">#${city.rank}</span>
          <span class="city-name">${city.name}</span>
          <span class="city-score">${score.toFixed(1)}</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width: ${score}%"></div>
        </div>
        <button class="stats-toggle" onclick="toggleStats(this)">
          View Stats <span class="chevron">&#9660;</span>
        </button>
        <div class="stats-drawer">
          <div class="stats-drawer-inner"></div>
        </div>
      `;

      resultsEl.appendChild(card);
    });
  }

  // ── Toggle stats drawer ─────────────────────
  async function toggleStats(btn) {
    const card   = btn.closest('.city-card');
    const drawer = card.querySelector('.stats-drawer');
    const inner  = card.querySelector('.stats-drawer-inner');
    const geoId  = card.dataset.geoId;

    // Toggle collapsed state
    const isOpen = card.classList.toggle('expanded');

    if (!isOpen) return; // collapsing — nothing to fetch

    // Already loaded — just re-open
    if (card.dataset.statsLoaded) return;

    // First open — fetch and render
    inner.innerHTML = '<div class="stats-loading">Loading...</div>';

    try {
      const res = await fetch(`/api/city/${geoId}`);
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();

      // Group stats by category
      const grouped = {};
      data.stats.forEach(stat => {
        if (!grouped[stat.category]) grouped[stat.category] = [];
        grouped[stat.category].push(stat);
      });

      inner.innerHTML = Object.entries(grouped).map(([category, stats]) => `
        <div>
          <div class="stats-category-label">${category}</div>
          ${stats.map(s => `
            <div class="stat-row">
              <div class="stat-row-top">
                <span class="stat-label">${s.label}</span>
                <span class="stat-value">${s.value}</span>
              </div>
              <div class="stat-descriptor">${s.descriptor}</div>
            </div>
          `).join('')}
        </div>
      `).join('');

      card.dataset.statsLoaded = 'true';

    } catch (err) {
      inner.innerHTML = '<div class="stats-loading">Could not load stats.</div>';
      console.error('Stats fetch failed:', err);
    }
  }

  // ── Set UI state ────────────────────────────
  function setWaiting(waiting) {
    isWaiting = waiting;
    inputEl.disabled = waiting;
    sendBtn.disabled = waiting;
    if (!waiting) inputEl.focus();
  }

  // ── Send message ────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting || !conversationId) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage('user', text);
    setWaiting(true);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversationId, message: text }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      hideTyping();
      addMessage('assistant', data.message);

      if (data.city_card) renderCityCard(data.city_card);

      if (data.cities) {
        renderCities(data.cities);
        checkReportStatus(conversationId);
      } else if (data.suggested_cities && resultsEl.querySelectorAll('.city-card').length === 0) {
        // Only show suggested cities when the panel has no ranked results yet
        renderCities(data.suggested_cities);
        checkReportStatus(conversationId);
      }

      if (data.at_limit) {
        inputEl.disabled = true;
        sendBtn.disabled = true;
        inputEl.placeholder = 'Conversation complete';
      }

    } catch (err) {
      hideTyping();
      showToast('Something went wrong — please try again');
      console.error(err);
    } finally {
      setWaiting(false);
    }
  }

  // ── Textarea auto-resize ────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // ── Send on Enter (Shift+Enter = newline) ───
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── ESC closes city modal ────────────────────
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCityModal(); });


  // ── Start conversation on load ──────────────
  async function init() {
    // Handle return from Stripe checkout (success)
    if (_reportSuccess && _urlConvId) {
      conversationId = _urlConvId;
      showTyping();
      try {
        const res = await fetch(`/api/results/${_urlConvId}`);
        if (res.ok) {
          const data = await res.json();
          if (data.cities) renderCities(data.cities);
        }
      } catch (e) { /* ignore */ }
      hideTyping();
      addMessage('assistant', 'Welcome back! Your payment was received — your report is being generated. It will be ready to download below in about 15–30 seconds.');
      setWaiting(false);
      showReportCta('generating', null);
      startReportPolling(_urlConvId);
      return;
    }

    // Handle return from Stripe checkout (cancel) or any direct conversation link
    if (_urlConvId) {
      await loadPastConversation(_urlConvId);
      return;
    }

    showTyping();
    try {
      const res = await fetch('/api/start', { method: 'POST' });
      if (!res.ok) throw new Error(`Start failed: ${res.status}`);
      const data = await res.json();

      conversationId = data.conversation_id;
      hideTyping();
      addMessage('assistant', data.message);
      setWaiting(false);

    } catch (err) {
      hideTyping();
      addMessage('assistant', 'Something went wrong starting the conversation. Please refresh.');
      console.error(err);
    }
  }

  // ── Fetch current user ──────────────────────
  async function fetchMe() {
    try {
      const res = await fetch('/api/me');
      if (!res.ok) return;
      const data = await res.json();
      currentUsername = data.username;
      document.getElementById('user-badge').textContent = data.username;
    } catch (e) { /* silently ignore */ }
  }

  // ── History panel toggle ─────────────────────
  function toggleHistory() {
    const panel = document.getElementById('history-panel');
    const btn   = document.getElementById('history-btn');
    historyOpen = !historyOpen;
    panel.classList.toggle('open', historyOpen);
    btn.classList.toggle('active', historyOpen);
    if (historyOpen) fetchHistory();
  }

  // ── Fetch and render history ─────────────────
  async function fetchHistory() {
    const listEl = document.getElementById('history-list');
    listEl.innerHTML = '<div class="history-loading">Loading…</div>';
    try {
      const res = await fetch('/api/history');
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderHistory(data.conversations);
    } catch (e) {
      listEl.innerHTML = '<div class="history-empty">Could not load history.</div>';
    }
  }

  function renderHistory(conversations) {
    const listEl = document.getElementById('history-list');
    if (!conversations || conversations.length === 0) {
      listEl.innerHTML = '<div class="history-empty">No previous chats yet.<br>Start a new conversation to see your history here.</div>';
      return;
    }

    listEl.innerHTML = conversations.map(c => {
      const date = c.created_at
        ? new Date(c.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
        : '—';
      const cityNames = c.top_cities.length
        ? c.top_cities.map(ct => ct.name.split(',')[0]).join(', ')
        : 'No results yet';
      const isActive = c.id === conversationId;
      const meta = `${c.turn_count} turns · ${c.query_count} quer${c.query_count === 1 ? 'y' : 'ies'}`;

      return `
        <div class="history-item${isActive ? ' active' : ''}" onclick="loadPastConversation('${c.id}')">
          <div class="history-item-date">${date}</div>
          <div class="history-item-cities">${cityNames}</div>
          <div class="history-item-meta">${meta}${c.completed ? ' · completed' : ''}</div>
        </div>`;
    }).join('');
  }

  // ── Load a past conversation ─────────────────
  async function loadPastConversation(id) {
    // Stop any running poll and reset CTA
    if (reportPollTimer) { clearInterval(reportPollTimer); reportPollTimer = null; }
    reportCta.style.display = 'none';
    reportCta.innerHTML = '';

    // Switch active conversation
    conversationId = id;

    // Clear panels
    messagesEl.innerHTML = '';
    resultsEl.innerHTML = `
      <div class="empty-state" id="results-empty-state">
        <div class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted); opacity: 0.5;">
            <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/>
          </svg>
        </div>
        <p>Answer a few questions and we'll find your best matches</p>
      </div>`;

    try {
      const res = await fetch(`/api/conversation/${id}`);
      if (!res.ok) throw new Error();
      const data = await res.json();

      // Render messages
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(m => addMessage(m.role === 'assistant' ? 'assistant' : 'user', m.content));
      }

      // Render cities and check report status
      if (data.cities && data.cities.length > 0) {
        renderCities(data.cities);
        checkReportStatus(id);

        // Restore the city preview button for the top city
        const topGeoId = data.cities[0].geo_id;
        if (topGeoId) {
          fetch(`/api/city/${topGeoId}/card`)
            .then(r => r.ok ? r.json() : null)
            .then(card => { if (card) renderCityCard(card); })
            .catch(() => {});
        }
      }

      setWaiting(false);

      // Update active highlight in history list
      document.querySelectorAll('.history-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('onclick').includes(id));
      });
    } catch (e) {
      showToast('Could not load conversation.');
    }
  }

  // ── Start a brand-new chat ───────────────────
  async function startNewChat() {
    // Stop any running poll and reset CTA
    if (reportPollTimer) { clearInterval(reportPollTimer); reportPollTimer = null; }
    reportCta.style.display = 'none';
    reportCta.innerHTML = '';

    // Close history panel
    historyOpen = false;
    document.getElementById('history-panel').classList.remove('open');
    document.getElementById('history-btn').classList.remove('active');

    // Reset UI
    document.getElementById('messages').innerHTML = '';
    document.getElementById('results-list').innerHTML = `
      <div class="empty-state">
        <div class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--muted); opacity: 0.5;">
            <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7.05 11.5 7.65 12a.5.5 0 0 0 .7 0C13 21.5 20 15.4 20 10a8 8 0 0 0-8-8z"/>
          </svg>
        </div>
        <p>Answer a few questions and we'll find your best matches</p>
      </div>`;
    conversationId = null;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    inputEl.placeholder = 'Tell me what\'s going on...';
    await init();
  }

  fetchMe();
  init();
</script>
</body>
</html>
