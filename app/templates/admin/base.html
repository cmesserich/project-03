<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin{% endblock %} — Touchgrass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #222;
      --border:     #2a2a2a;
      --text:       #e8e4dc;
      --muted:      #888;
      --accent:     #c8b89a;
      --accent-dim: #9a8a70;
      --green:      #6b8f5e;
      --red:        #c0544a;
      --yellow:     #c8a84a;
      --radius:     6px;
      --nav-w:      220px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.55; }

    /* ── Layout ── */
    .layout { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--nav-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-brand {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand .name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--accent);
    }

    .sidebar-brand .label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.15rem;
    }

    .nav { padding: 1rem 0; flex: 1; }

    .nav-section {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.75rem 1.25rem 0.35rem;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1.25rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.12s, background 0.12s;
      border-left: 2px solid transparent;
    }

    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }

    .nav-icon { font-size: 1rem; width: 1.1rem; text-align: center; }

    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .sidebar-footer strong { color: var(--text); }

    .sidebar-footer form { margin-top: 0.5rem; }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.12s, color 0.12s;
    }

    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 1rem 1.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .page-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 300;
      color: var(--text);
    }

    .content { padding: 1.75rem; flex: 1; }

    /* ── Flash messages ── */
    .flash {
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
    }

    .flash.success { background: rgba(107,143,94,0.15); border: 1px solid rgba(107,143,94,0.4); color: #8bc97e; }
    .flash.error   { background: rgba(192,84,74,0.15);  border: 1px solid rgba(192,84,74,0.4);  color: #e07870; }

    /* ── Cards / stats ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 1rem; margin-bottom: 1.75rem; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
    }

    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-family: 'Space Mono', monospace; font-size: 1.6rem; color: var(--accent); margin-top: 0.2rem; }

    /* ── Tables ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .table-title { font-size: 0.875rem; font-weight: 500; color: var(--text); }

    table { width: 100%; border-collapse: collapse; }

    th {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0.65rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.65rem 1.25rem;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
    }

    .badge-green  { background: rgba(107,143,94,0.2);  color: #8bc97e; }
    .badge-red    { background: rgba(192,84,74,0.2);   color: #e07870; }
    .badge-yellow { background: rgba(200,168,74,0.2);  color: #d4b060; }
    .badge-muted  { background: rgba(136,136,136,0.15); color: var(--muted); }

    /* ── Action buttons ── */
    .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .btn-sm {
      padding: 0.25rem 0.65rem;
      border-radius: var(--radius);
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.12s;
    }

    .btn-sm:hover { opacity: 0.8; }
    .btn-sm.outline { background: none; border-color: var(--border); color: var(--muted); }
    .btn-sm.outline:hover { border-color: var(--accent-dim); color: var(--text); }
    .btn-sm.danger  { background: rgba(192,84,74,0.15); border-color: rgba(192,84,74,0.4); color: #e07870; }
    .btn-sm.primary { background: var(--accent); color: #1a1408; }
    .btn-sm.success { background: rgba(107,143,94,0.2); border-color: rgba(107,143,94,0.4); color: #8bc97e; }

    /* ── Modal / inline form ── */
    .inline-form { display: inline; }

    /* ── Create user form ── */
    .create-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .create-form h3 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1rem;
      font-weight: 400;
      margin-bottom: 1rem;
    }

    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }

    .form-field { display: flex; flex-direction: column; gap: 0.25rem; flex: 1; min-width: 140px; }

    .form-field label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }

    .form-field input[type="text"],
    .form-field input[type="email"],
    .form-field input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      padding: 0.45rem 0.75rem;
      outline: none;
    }

    .form-field input:focus { border-color: var(--accent-dim); }

    .form-field .checkbox-row { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.5rem; font-size: 0.85rem; color: var(--muted); }

    .btn-primary {
      background: var(--accent);
      color: #1a1408;
      border: none;
      border-radius: var(--radius);
      padding: 0.45rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary:hover { background: var(--accent-dim); }

    /* ── Reset password inline ── */
    .reset-row { display: flex; gap: 0.4rem; }
    .reset-row input { flex: 1; min-width: 0; }

    /* ── Mono ── */
    .mono { font-family: 'Space Mono', monospace; font-size: 0.78rem; }

    .truncate { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="name">Touchgrass</div>
      <div class="label">Admin Console</div>
    </div>

    <nav class="nav">
      <div class="nav-section">Overview</div>
      <a href="/admin/" class="{% if active_page == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">◈</span> Dashboard
      </a>

      <div class="nav-section">Management</div>
      <a href="/admin/users" class="{% if active_page == 'users' %}active{% endif %}">
        <span class="nav-icon">◎</span> Users
      </a>
      <a href="/admin/sessions" class="{% if active_page == 'sessions' %}active{% endif %}">
        <span class="nav-icon">◐</span> Sessions
      </a>
      <a href="/admin/conversations" class="{% if active_page == 'conversations' %}active{% endif %}">
        <span class="nav-icon">◫</span> Conversations
      </a>

      <div class="nav-section">App</div>
      <a href="/" target="_blank">
        <span class="nav-icon">↗</span> Open App
      </a>
    </nav>

    <div class="sidebar-footer">
      Signed in as <strong>{{ admin.username }}</strong>
      <form method="POST" action="/auth/logout">
        <button class="btn-logout" type="submit">Sign out</button>
      </form>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main">
    <div class="topbar">
      <div class="page-title">{% block page_title %}{% endblock %}</div>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>
</body>
</html>
